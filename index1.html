<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Galaxy For You</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* Agar klik tembus ke canvas 3D */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            box-sizing: border-box;
            z-index: 10;
        }
        .title {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            margin-top: 10vh;
        }
        .info {
            text-align: center;
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 20px;
        }
        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            letter-spacing: 1px;
            z-index: 20;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        #cam-toggle {
            pointer-events: auto; /* Agar tombol bisa diklik */
            position: absolute;
            bottom: 20px;
            left: 20px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            font-weight: bold;
            z-index: 100;
        }
        #cam-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <div id="loading">Memuat Semesta...</div>
    
    <div id="ui" style="display: none;">
        <div class="title" id="custom-text">Only For U</div>
        <div class="info">Drag untuk memutar • Scroll untuk zoom<br><br>
            <span id="hand-status" style="color: #4CAF50; font-weight: bold; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; display: inline-block; margin-bottom: 20px;">Mendeteksi Tangan...</span>
        </div>
        <button id="cam-toggle">📸 Matikan Kamera</button>
    </div>

    <!-- Video Preview Kamera -->
    <video id="input_video" style="position: absolute; bottom: 20px; right: 20px; width: 120px; border-radius: 8px; border: 2px solid white; display: none; z-index: 100;" autoplay playsinline></video>

    <!-- Library Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <!-- MediaPipe Hand Tracking -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script>
        /* =========================================
           KONFIGURASI UTAMA
           Ganti tulisan dan foto di bawah ini!
        ========================================= */
        const TULISAN_ATAS = "Only For U, Afi Ryskiana";
        
        // Masukkan nama file foto kamu di sini (misal: 'foto1.jpg', 'foto2.png').
        // Karena saat ini kosong, sistem otomatis membuatkan foto angka 1-11.
        const FOTO_FOTO = [
            'foto1.jpg', 'foto2.jpg', 'foto3.jpg', 'foto4.jpg', 'foto5.jpg', 'foto6.jpg', 'foto7.jpg', 'foto8.jpg', 'foto9.jpg', 'foto10.jpg', 'foto11.jpg' // 11 Foto
        ];

        document.getElementById('custom-text').innerText = TULISAN_ATAS;

        /* =========================================
           SETUP THREE.JS 
        ========================================= */
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 50);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Optimal untuk HP
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 15;
        controls.maxDistance = 100;

        const galaxyGroup = new THREE.Group();
        scene.add(galaxyGroup);

        // --- FUNGSI PARTIKEL BUNDAR ---
        function createCircleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.beginPath();
            ctx.arc(32, 32, 30, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            return new THREE.CanvasTexture(canvas);
        }
        const circleTex = createCircleTexture();

        /* =========================================
           1. LOVE 3D (Red Heart)
        ========================================= */
        const heartParticles = 20000; 
        const heartGeo = new THREE.BufferGeometry();
        const heartPos = new Float32Array(heartParticles * 3);

        let j = 0;
        while (j < heartParticles) {
            const x = (Math.random() - 0.5) * 3;
            const y = (Math.random() - 0.5) * 3;
            const z = (Math.random() - 0.5) * 3;
            
            // Rumus matematika bentuk Love 3D
            const eq = Math.pow(x*x + (9/4)*y*y + z*z - 1, 3) - x*x*z*z*z - (9/80)*y*y*z*z*z;
            
            if (eq <= 0) {
                const scale = 11; 
                heartPos[j * 3] = x * scale;
                heartPos[j * 3 + 1] = z * scale; 
                heartPos[j * 3 + 2] = -y * scale;
                j++;
            }
        }

        heartGeo.setAttribute('position', new THREE.BufferAttribute(heartPos, 3));
        const heartMat = new THREE.PointsMaterial({
            color: 0xff1133,
            size: 0.4, // Partikel Love diperbesar
            map: circleTex,
            alphaTest: 0.5,
            transparent: true,
            opacity: 0.9,
            blending: THREE.AdditiveBlending
        });
        const redHeart = new THREE.Points(heartGeo, heartMat);
        galaxyGroup.add(redHeart);

        /* =========================================
           2. CINCIN PARTIKEL PUTIH (Outer Ring)
        ========================================= */
        const ringParticles = 40000; 
        const ringGeo = new THREE.BufferGeometry();
        const ringPos = new Float32Array(ringParticles * 3);

        for (let i = 0; i < ringParticles; i++) {
            const theta = Math.random() * Math.PI * 2;
            const r = 15 + Math.random() * 20; 
            
            ringPos[i * 3] = r * Math.cos(theta);
            ringPos[i * 3 + 1] = (Math.random() - 0.5) * 2; 
            ringPos[i * 3 + 2] = r * Math.sin(theta);
        }

        ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPos, 3));
        const ringMat = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.25, // Partikel Cincin diperbesar
            map: circleTex,
            alphaTest: 0.5,
            transparent: true,
            opacity: 0.8
        });
        const whiteRing = new THREE.Points(ringGeo, ringMat);
        galaxyGroup.add(whiteRing);

        /* =========================================
           3. BACKGROUND BINTANG, PLANET & BINTANG JATUH
        ========================================= */
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(5000 * 3);
        for(let i=0; i<5000; i++) {
            starPos[i*3] = (Math.random() - 0.5) * 200;
            starPos[i*3+1] = (Math.random() - 0.5) * 200;
            starPos[i*3+2] = (Math.random() - 0.5) * 200;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({color: 0xffffff, size: 0.3, map: circleTex, alphaTest: 0.5});
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // --- PLANET BACKGROUND ---
        const planetColors = [0x3355ff, 0xff5533, 0xaa33ff, 0x33ffaa, 0xffaa33];
        for(let i=0; i<10; i++) {
            const radius = 3 + Math.random() * 8;
            const planetGeo = new THREE.SphereGeometry(radius, 24, 24);
            const planetMat = new THREE.MeshBasicMaterial({ 
                color: planetColors[i % planetColors.length], 
                wireframe: Math.random() > 0.4, // Sebagian dibuat jaring/wireframe
                transparent: true,
                opacity: 0.5
            });
            const planet = new THREE.Mesh(planetGeo, planetMat);
            planet.position.set(
                (Math.random() - 0.5) * 250,
                (Math.random() - 0.5) * 250,
                -60 - Math.random() * 150 // Ditaruh jauh di belakang
            );
            scene.add(planet);
        }

        // --- BINTANG JATUH ---
        const meteorParticles = 100;
        const meteorGeo = new THREE.BufferGeometry();
        const meteorPos = new Float32Array(meteorParticles * 3);
        const meteorVel = [];
        for(let i=0; i<meteorParticles; i++) {
            meteorPos[i*3] = (Math.random() - 0.5) * 150;
            meteorPos[i*3+1] = 50 + Math.random() * 50; 
            meteorPos[i*3+2] = (Math.random() - 0.5) * 150;
            meteorVel.push(0.5 + Math.random() * 1.5); 
        }
        meteorGeo.setAttribute('position', new THREE.BufferAttribute(meteorPos, 3));
        const meteorMat = new THREE.PointsMaterial({color: 0xffffff, size: 0.8, map: circleTex, alphaTest: 0.5, transparent:true, opacity:0.8});
        const meteors = new THREE.Points(meteorGeo, meteorMat);
        scene.add(meteors);

        /* =========================================
           4. FOTO-FOTO DI SEKITAR CINCIN (11 Foto) ROUNDED
        ========================================= */
        function drawRoundedRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        let loadedCount = 0;
        const totalPhotos = 11;

        function getRoundedTexture(url, index) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 455; // Aspect ratio 9:16
            const ctx = canvas.getContext('2d');
            const radius = 35; // Radius lengkungan (rounded corners)
            
            const tex = new THREE.CanvasTexture(canvas);

            function drawFallback() {
                ctx.clearRect(0, 0, 256, 455);
                ctx.fillStyle = '#ffffff';
                drawRoundedRect(ctx, 0, 0, 256, 455, radius);
                ctx.fill();
                
                ctx.strokeStyle = '#cccccc';
                ctx.lineWidth = 10;
                drawRoundedRect(ctx, 5, 5, 246, 445, radius - 5);
                ctx.stroke();
                
                ctx.fillStyle = '#333333';
                ctx.font = 'bold 100px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(index, 128, 227);
                tex.needsUpdate = true;
                checkLoad();
            }

            if (!url || url === '') {
                setTimeout(drawFallback, 10);
                return tex;
            }

            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = () => {
                ctx.clearRect(0, 0, 256, 455);
                ctx.save();
                
                // Klip dengan bentuk rounded rectangle
                drawRoundedRect(ctx, 0, 0, 256, 455, radius);
                ctx.clip();

                // Object-fit: cover logik
                const imgAspect = img.width / img.height;
                const canvasAspect = 256 / 455;
                let drawWidth = 256;
                let drawHeight = 455;
                let offsetX = 0;
                let offsetY = 0;

                if (imgAspect > canvasAspect) {
                    drawWidth = 455 * imgAspect;
                    offsetX = -(drawWidth - 256) / 2;
                } else {
                    drawHeight = 256 / imgAspect;
                    offsetY = -(drawHeight - 455) / 2;
                }

                ctx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);
                ctx.restore();
                
                // Tambahkan border putih tipis di dalam area lengkungan
                ctx.lineWidth = 8;
                ctx.strokeStyle = '#ffffff';
                drawRoundedRect(ctx, 4, 4, 248, 447, radius - 4);
                ctx.stroke();

                tex.needsUpdate = true;
                checkLoad();
            };
            img.onerror = drawFallback; // Pakai angka kalau gambar gagal dimuat
            img.src = url;
            
            return tex;
        }

        for (let i = 0; i < totalPhotos; i++) {
            const texture = getRoundedTexture(FOTO_FOTO[i], i + 1);

            const material = new THREE.SpriteMaterial({ map: texture, color: 0xffffff });
            const sprite = new THREE.Sprite(material);
            
            sprite.scale.set(4.5, 8, 1);

            const angle = (i / totalPhotos) * Math.PI * 2;
            const radius = 22; 
            
            sprite.position.set(
                radius * Math.cos(angle),
                (Math.random() - 0.5) * 4,
                radius * Math.sin(angle)
            );

            galaxyGroup.add(sprite);
        }

        function checkLoad() {
            loadedCount++;
            if (loadedCount >= totalPhotos) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('ui').style.display = 'flex';
                document.getElementById('input_video').style.display = 'block';
            }
        }

        /* =========================================
           HAND TRACKING (MEDIAPIPE) - TANGAN TERBUKA
        ========================================= */
        const videoElement = document.getElementById('input_video');
        const handStatus = document.getElementById('hand-status');
        const camToggleBtn = document.getElementById('cam-toggle');
        
        let handActive = false;
        let isActivePose = false;
        let wasActivePose = false;
        
        let prevHandX = 0;
        
        // Target variabel untuk digerakkan
        let targetRotationY = 0;

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                handActive = true;
                const landmarks = results.multiHandLandmarks[0];
                const wrist = landmarks[0];
                
                const handX = wrist.x; 

                // Deteksi Tangan Terbuka: Cek apakah ujung jari di atas pangkal sendi
                const isHandOpen = (
                    landmarks[8].y < landmarks[6].y &&   // Telunjuk
                    landmarks[12].y < landmarks[10].y && // Tengah
                    landmarks[16].y < landmarks[14].y && // Manis
                    landmarks[20].y < landmarks[18].y    // Kelingking
                );

                isActivePose = isHandOpen;

                if (isActivePose) {
                    handStatus.innerText = "✋ Tangan Terbuka! Geser L/R";
                    handStatus.style.color = "#ffaa00";
                    
                    if (!wasActivePose) {
                        // Frame pertama saat tangan dibuka, simpan titik awalnya
                        prevHandX = handX;
                    } else {
                        // Frame selanjutnya, hitung selisih geraknya (delta)
                        const deltaX = handX - prevHandX;
                        
                        targetRotationY -= deltaX * 3; // Kecepatan rotasi tangan
                        
                        prevHandX = handX;
                    }
                } else {
                    handStatus.innerText = "✊ Tutup Tangan (Idle)";
                    handStatus.style.color = "#00ff00";
                }
                
                wasActivePose = isActivePose;

            } else {
                handActive = false;
                isActivePose = false;
                wasActivePose = false;
                handStatus.innerText = "Mendeteksi Tangan...";
                handStatus.style.color = "#ffffff";
            }
        });

        const camera_utils = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 320,
            height: 240
        });
        camera_utils.start();

        /* =========================================
           TOGGLE KAMERA ON / OFF
        ========================================= */
        let isCameraOn = true;
        camToggleBtn.addEventListener('click', () => {
            isCameraOn = !isCameraOn;
            if (isCameraOn) {
                camera_utils.start();
                videoElement.style.display = 'block';
                handStatus.style.display = 'inline-block';
                camToggleBtn.innerText = '📸 Matikan Kamera';
                camToggleBtn.style.background = 'rgba(255, 255, 255, 0.15)';
            } else {
                camera_utils.stop();
                videoElement.style.display = 'none';
                handStatus.style.display = 'none';
                camToggleBtn.innerText = '📷 Nyalakan Kamera';
                camToggleBtn.style.background = 'rgba(255, 50, 50, 0.4)';
                handActive = false;
                isActivePose = false;
            }
        });

        /* =========================================
           ANIMASI & RENDER LOOP
        ========================================= */
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            if (handActive && isActivePose) {
                // Saat tangan terbuka: matikan orbit controls mouse
                controls.enabled = false;
            } else {
                // Saat dilepas (Idle): 
                // Lanjutkan putaran otomatis perlahan
                targetRotationY += 0.002; 
                // Nyalakan kembali orbit controls agar bisa pakai mouse
                controls.enabled = true;
            }

            // Muluskan pergerakan rotasi (Lerp)
            galaxyGroup.rotation.y += (targetRotationY - galaxyGroup.rotation.y) * 0.1;

            // Putar Love 3D berlawanan arah
            redHeart.rotation.y = -elapsedTime * 0.05;

            // Animasi Bintang Jatuh
            const meteorPositions = meteors.geometry.attributes.position.array;
            for(let i=0; i<meteorParticles; i++) {
                meteorPositions[i*3+1] -= meteorVel[i]; 
                meteorPositions[i*3] -= meteorVel[i] * 0.1; 
                if (meteorPositions[i*3+1] < -50) {
                    meteorPositions[i*3+1] = 50 + Math.random() * 50; 
                    meteorPositions[i*3] = (Math.random() - 0.5) * 150;
                }
            }
            meteors.geometry.attributes.position.needsUpdate = true;

            controls.update();
            renderer.render(scene, camera);
        }

        /* =========================================
           RESPONSIVE WINDOW RESIZE
        ========================================= */
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Mulai animasi
        animate();

    </script>
</body>
</html>
